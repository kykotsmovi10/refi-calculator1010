<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mortgage Refinance Analyzer</title>
<meta name="theme-color" content="#265a3a"/><meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--forest:#265a3a;--forest-light:#3a7d54;--forest-glow:#e8f5ee;--sienna:#9c4a2d;--sienna-light:#c0714e;--gold:#b8942d;--gold-bg:#fdf8ec;--parchment:#f6f4ed;--parchment-deep:#edeadf;--ink:#1c1a16;--ink-soft:#4a473e;--ink-muted:#7a7770;--ink-faint:#a8a49a;--border:#d8d4c8;--border-light:#e8e5da;--card:#fff;--radius:10px;--shadow-sm:0 1px 3px rgba(0,0,0,.05)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--parchment);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}@media print{body{background:#fff;font-size:10px}.no-print{display:none!important}.card{box-shadow:none!important;border:1px solid #ddd!important;break-inside:avoid}.present-overlay{position:relative!important;background:#fff!important;overflow:visible!important;padding:0!important}.present-page{box-shadow:none!important;max-height:none!important;overflow:visible!important;border:none!important;max-width:100%!important;border-radius:0!important}}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--parchment-deep)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}.animate-in{animation:fadeUp .5s ease-out both}@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}@keyframes overlayIn{from{opacity:0}to{opacity:1}}input[type="number"]{-moz-appearance:textfield}input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}.present-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(28,26,22,.6);backdrop-filter:blur(8px);z-index:2000;overflow-y:auto;animation:overlayIn .25s ease-out;padding:24px}.present-page{background:var(--card);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.25);max-width:860px;width:100%;margin:0 auto;animation:modalIn .4s ease-out;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const fmt=v=>{if(v==null||isNaN(v))return"$0.00";return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v)};
const fmtPct=v=>((v||0)*100).toFixed(3)+"%";
function monthlyPI(p,ar,tm){if(p<=0||tm<=0)return 0;if(ar===0)return p/tm;const r=ar/12;return(p*r*Math.pow(1+r,tm))/(Math.pow(1+r,tm)-1)}
function amortize(p,ar,tm,extra){const r=ar/12,base=monthlyPI(p,ar,tm);let bal=p;const rows=[];let totI=0,totP=0;for(let m=1;m<=tm&&bal>.005;m++){const ip=bal*r;let pp=base-ip+extra;if(pp>bal)pp=bal;bal=Math.max(0,bal-pp);totI+=ip;totP+=pp;rows.push({month:m,payment:ip+pp,principal:pp,interest:ip,balance:bal})}return{rows,totalInterest:totI,months:rows.length}}
function findEffRate(p,tI,tm){let lo=0,hi=.5;for(let i=0;i<80;i++){const mid=(lo+hi)/2,r=mid/12;if(!r){lo=mid;continue}const pmt=(p*r*Math.pow(1+r,tm))/(Math.pow(1+r,tm)-1);if(pmt*tm-p<tI)lo=mid;else hi=mid}return(lo+hi)/2}
function ltvColor(l){return l<=80?'var(--forest)':l<=90?'var(--gold)':'var(--sienna)'}
function ltvLabel(l){return l<=80?'No PMI required':l<=90?'PMI likely required':l<=95?'High LTV — PMI required':'Very high LTV'}

function Card({children,title,subtitle,accent,delay}){return(<div className="card animate-in" style={{background:'var(--card)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'24px 28px',boxShadow:'var(--shadow-sm)',animationDelay:(delay||0)+'ms'}}>{title&&<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:subtitle?4:18}}>{accent&&<div style={{width:4,height:24,borderRadius:2,background:accent}}/>}<h2 style={{fontSize:18,fontWeight:700,letterSpacing:-.4}}>{title}</h2></div>}{subtitle&&<p style={{fontSize:12.5,color:'var(--ink-muted)',marginBottom:18,marginLeft:accent?14:0}}>{subtitle}</p>}{children}</div>)}
function Inp({label,value,onChange,prefix,suffix,step}){return(<div style={{display:'flex',flexDirection:'column',gap:4,flex:1,minWidth:110}}><label style={{fontSize:10.5,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1}}>{label}</label><div style={{display:'flex',alignItems:'center',gap:4,background:'var(--parchment)',border:'1.5px solid var(--border)',borderRadius:8,padding:'7px 12px',transition:'border-color .2s'}} onFocus={e=>e.currentTarget.style.borderColor='var(--forest)'} onBlur={e=>e.currentTarget.style.borderColor='var(--border)'}>{prefix&&<span style={{color:'var(--ink-faint)',fontSize:14,fontWeight:600,userSelect:'none'}}>{prefix}</span>}<input type="number" value={value} step={step||"any"} onChange={e=>onChange(e.target.value===""?"":Number(e.target.value))} style={{border:'none',outline:'none',background:'transparent',fontSize:15,fontWeight:600,color:'var(--ink)',width:'100%',fontFamily:"'DM Sans',sans-serif"}}/>{suffix&&<span style={{color:'var(--ink-faint)',fontSize:13,userSelect:'none'}}>{suffix}</span>}</div></div>)}
function Stat({label,value,sub,color,large}){return(<div style={{flex:1,minWidth:large?160:130,background:'var(--parchment)',borderRadius:10,padding:large?'18px 20px':'14px 16px',border:'1px solid var(--border-light)'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.9,marginBottom:5}}>{label}</div><div style={{fontSize:large?28:21,fontWeight:700,color:color||'var(--ink)',letterSpacing:-.6,lineHeight:1.15}}>{value}</div>{sub&&<div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:4,lineHeight:1.4}}>{sub}</div>}</div>)}
function DebtRow({debt,onUpdate,onRemove,idx}){const is={border:'none',outline:'none',background:'transparent',fontSize:14,fontWeight:500,color:'var(--ink)',width:'100%',fontFamily:"'DM Sans',sans-serif"};const cw={display:'flex',alignItems:'center',gap:3,background:'var(--parchment)',border:'1.5px solid var(--border)',borderRadius:7,padding:'6px 10px'};return(<div style={{display:'flex',gap:8,alignItems:'flex-end',flexWrap:'wrap',padding:'10px 0',borderBottom:'1px solid var(--border-light)'}}><div style={{width:26,textAlign:'center',paddingBottom:6}}><span style={{fontSize:11,fontWeight:700,color:'var(--ink-faint)'}}>{idx}</span></div><div style={{flex:'2 1 150px',display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:9.5,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Creditor</label><input value={debt.name} onChange={e=>onUpdate({...debt,name:e.target.value})} placeholder="e.g. Visa, Auto Loan..." style={{...is,...cw,padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:7}}/></div><div style={{flex:'1 1 115px',display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:9.5,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Balance</label><div style={cw}><span style={{color:'var(--ink-faint)',fontSize:13,fontWeight:600}}>$</span><input type="number" value={debt.balance} onChange={e=>onUpdate({...debt,balance:Number(e.target.value)})} style={is}/></div></div><div style={{flex:'1 1 115px',display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:9.5,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Mo. Payment</label><div style={cw}><span style={{color:'var(--ink-faint)',fontSize:13,fontWeight:600}}>$</span><input type="number" value={debt.payment} onChange={e=>onUpdate({...debt,payment:Number(e.target.value)})} style={is}/></div></div><button onClick={onRemove} title="Remove" className="no-print" style={{background:'none',border:'none',cursor:'pointer',color:'var(--sienna)',fontSize:20,fontWeight:700,lineHeight:1,padding:'4px 6px',marginBottom:4,opacity:.6,transition:'opacity .15s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=.6}>×</button></div>)}

function CostBar({principal:p,interest:it,saved:sv}){const t=p+it+sv;if(!t)return null;const s=[{pct:p/t*100,c:'var(--forest)',l:'Principal',v:p},{pct:it/t*100,c:'var(--sienna)',l:'Interest Paid',v:it}];if(sv/t>.003)s.push({pct:sv/t*100,c:'var(--gold)',l:'Interest Saved',v:sv});return(<div><div style={{display:'flex',height:38,borderRadius:10,overflow:'hidden',border:'1px solid var(--border)'}}>{s.map((x,i)=><div key={i} style={{width:x.pct+'%',background:x.c,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:600,transition:'width .5s'}}>{x.pct>14&&x.pct.toFixed(1)+'%'}</div>)}</div><div style={{display:'flex',gap:20,marginTop:10,flexWrap:'wrap'}}>{s.map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'var(--ink-soft)'}}><span style={{width:10,height:10,borderRadius:3,background:x.c,display:'inline-block'}}/><span style={{fontWeight:600}}>{x.l}</span><span style={{color:'var(--ink-muted)'}}>{fmt(x.v)}</span></div>)}</div></div>)}

function Chart({stdRows:sr,extRows:er,termMonths:tm}){if(!sr.length)return null;const W=640,H=240,PL=56,PB=36,PT=14,PR=14,mB=sr[0]?.balance||1;const xc=m=>PL+(m/tm)*(W-PL-PR),yc=b=>PT+(1-b/mB)*(H-PT-PB);const sp=Math.max(1,Math.floor(sr.length/100));const mk=rows=>rows.filter((_,i)=>i%sp===0||i===rows.length-1).map((r,i)=>`${i===0?'M':'L'}${xc(r.month).toFixed(1)},${yc(r.balance).toFixed(1)}`).join(' ');const pS=mk(sr),pE=mk(er);const area=pE+` L${xc(er[er.length-1].month).toFixed(1)},${yc(0).toFixed(1)} L${PL},${yc(0).toFixed(1)} Z`;const yT=[0,.25,.5,.75,1].map(f=>f*mB);const xY=[];for(let y=0;y<=Math.ceil(tm/12);y+=5)xY.push(y*12);return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',maxWidth:660,display:'block'}}><defs><linearGradient id="aG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--forest)" stopOpacity=".12"/><stop offset="100%" stopColor="var(--forest)" stopOpacity=".02"/></linearGradient></defs>{yT.map((v,i)=><g key={i}><line x1={PL} y1={yc(v)} x2={W-PR} y2={yc(v)} stroke="var(--border-light)" strokeWidth={.8}/><text x={PL-8} y={yc(v)+4} textAnchor="end" fontSize={9.5} fill="var(--ink-faint)" fontFamily="DM Sans">{v>=1000?'$'+(v/1000).toFixed(0)+'k':'$'+v.toFixed(0)}</text></g>)}{xY.map((m,i)=><text key={i} x={xc(m)} y={H-8} textAnchor="middle" fontSize={9.5} fill="var(--ink-faint)" fontFamily="DM Sans">Yr {m/12}</text>)}<path d={area} fill="url(#aG)"/><path d={pS} fill="none" stroke="var(--sienna-light)" strokeWidth={2.2} opacity={.55} strokeDasharray="6 3"/><path d={pE} fill="none" stroke="var(--forest)" strokeWidth={2.8}/>{er.length<sr.length&&<g><line x1={xc(er[er.length-1].month)} y1={PT} x2={xc(er[er.length-1].month)} y2={yc(0)} stroke="var(--forest)" strokeWidth={1.2} strokeDasharray="4 3" opacity={.5}/><text x={xc(er[er.length-1].month)} y={PT+10} textAnchor="middle" fontSize={9} fill="var(--forest)" fontWeight="600" fontFamily="DM Sans">Paid off!</text></g>}<g transform={`translate(${W-180},${PT+4})`}><line x1={0} y1={0} x2={20} y2={0} stroke="var(--sienna-light)" strokeWidth={2} strokeDasharray="6 3" opacity={.55}/><text x={24} y={4} fontSize={10} fill="var(--ink-muted)" fontFamily="DM Sans">Standard Payoff</text><line x1={0} y1={18} x2={20} y2={18} stroke="var(--forest)" strokeWidth={2.8}/><text x={24} y={22} fontSize={10} fill="var(--ink-muted)" fontFamily="DM Sans">With Extra Payments</text></g></svg>)}

function LTVGauge({ltv,homeVal:hv,principal:p,totDebtBal,totDebtPmt,ltvColor:lc}){const c=ltvColor(ltv),l=ltvLabel(ltv),eq=Math.max(0,hv-p);return(<div style={{marginTop:16,padding:'18px 20px',background:ltv<=80?'var(--forest-glow)':ltv<=90?'var(--gold-bg)':'#fdf0ec',borderRadius:12,border:`1.5px solid ${ltv<=80?'#c2dbc9':ltv<=90?'#e0d4a8':'#e0b8a8'}`}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:10}}>Loan-to-Value Ratio</div><div style={{position:'relative',height:28,borderRadius:8,overflow:'hidden',background:'rgba(0,0,0,.06)'}}><div style={{width:Math.min(100,ltv)+'%',height:'100%',borderRadius:8,background:`linear-gradient(90deg,var(--forest),${c})`,transition:'width .5s',display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:10}}><span style={{fontSize:13,fontWeight:800,color:'#fff',textShadow:'0 1px 3px rgba(0,0,0,.3)'}}>{ltv.toFixed(1)}%</span></div><div style={{position:'absolute',left:'80%',top:0,bottom:0,width:2,background:'var(--ink-faint)',opacity:.4}}/><div style={{position:'absolute',left:'80%',top:-16,transform:'translateX(-50%)',fontSize:9,color:'var(--ink-faint)',fontWeight:600}}>80%</div></div><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,flexWrap:'wrap',gap:6}}><span style={{fontSize:12,fontWeight:600,color:c}}>{l}</span><span style={{fontSize:12,color:'var(--ink-muted)'}}>Equity: <strong style={{color:'var(--forest)'}}>{fmt(eq)}</strong></span></div>{totDebtBal!=null&&<div style={{display:'flex',flexWrap:'wrap',gap:16,marginTop:14,paddingTop:14,borderTop:`1px solid ${ltv<=80?'#c2dbc9':ltv<=90?'#e0d4a8':'#e0b8a8'}`}}><div style={{flex:1,minWidth:100}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Total Debt</div><div style={{fontSize:20,fontWeight:700,color:'var(--sienna)',marginTop:3}}>{fmt(totDebtBal)}</div></div><div style={{flex:1,minWidth:100}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Monthly Pmts</div><div style={{fontSize:20,fontWeight:700,color:'var(--sienna)',marginTop:3}}>{fmt(totDebtPmt)}<span style={{fontSize:11,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div></div><div style={{flex:1,minWidth:100}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>New Loan</div><div style={{fontSize:20,fontWeight:700,color:'var(--forest)',marginTop:3}}>{fmt(p)}</div></div><div style={{flex:1,minWidth:100}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>New LTV</div><div style={{fontSize:20,fontWeight:700,color:c,marginTop:3}}>{ltv.toFixed(1)}%</div></div></div>}</div>)}

function ConsolidationBar({curMtgBal:mb,totDebtBal:db,closingCost:cc,principal:p}){return(<div style={{marginTop:18,padding:'18px 20px',background:'var(--forest-glow)',borderRadius:12,border:'1.5px solid #c2dbc9'}}><div style={{display:'flex',flexWrap:'wrap',gap:14,alignItems:'center'}}><div style={{flex:'1 1 130px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Current Mtg Balance</div><div style={{fontSize:20,fontWeight:700,color:'var(--ink)',marginTop:3}}>{fmt(mb)}</div></div><div style={{fontSize:22,fontWeight:300,color:'var(--border)',userSelect:'none'}}>+</div><div style={{flex:'1 1 130px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Debts Consolidated</div><div style={{fontSize:20,fontWeight:700,color:'var(--sienna)',marginTop:3}}>{fmt(db)}</div></div>{(cc||0)>0&&<React.Fragment><div style={{fontSize:22,fontWeight:300,color:'var(--border)',userSelect:'none'}}>+</div><div style={{flex:'1 1 120px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Closing Costs</div><div style={{fontSize:20,fontWeight:700,color:'var(--ink-muted)',marginTop:3}}>{fmt(cc)}</div></div></React.Fragment>}<div style={{fontSize:22,fontWeight:300,color:'var(--border)',userSelect:'none'}}>=</div><div style={{flex:'1 1 160px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--forest)',textTransform:'uppercase',letterSpacing:.8}}>New Loan Amount</div><div style={{fontSize:28,fontWeight:800,color:'var(--forest)',marginTop:3}}>{fmt(p)}</div></div></div></div>)}

function AmortTable({rows,basePI}){return(<div style={{marginTop:16,maxHeight:460,overflowY:'auto',border:'1px solid var(--border)',borderRadius:8}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}><thead><tr style={{background:'var(--parchment-deep)',position:'sticky',top:0,zIndex:2}}>{['Mo.','Payment','Principal','Interest','Extra','Balance'].map(h=><th key={h} style={{padding:'9px 10px',textAlign:'right',fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',fontSize:10,letterSpacing:.7,borderBottom:'2px solid var(--border)'}}>{h}</th>)}</tr></thead><tbody>{rows.map((r,i)=>{const bp=basePI-r.interest;const ex=r.principal-Math.max(0,bp);const yr=r.month%12===0;return(<tr key={r.month} style={{background:yr?'#f0eddf':i%2===0?'#fff':'var(--parchment)',borderBottom:yr?'2px solid var(--border)':'none'}}><td style={{padding:'5px 10px',textAlign:'right',color:'var(--ink-faint)',fontWeight:yr?700:500}}>{yr?`Yr ${r.month/12}`:r.month}</td><td style={{padding:'5px 10px',textAlign:'right',fontWeight:500}}>{fmt(r.payment)}</td><td style={{padding:'5px 10px',textAlign:'right',color:'var(--forest)',fontWeight:500}}>{fmt(Math.max(0,bp))}</td><td style={{padding:'5px 10px',textAlign:'right',color:'var(--sienna)',fontWeight:500}}>{fmt(r.interest)}</td><td style={{padding:'5px 10px',textAlign:'right',color:'var(--gold)',fontWeight:600}}>{ex>.01?fmt(ex):'—'}</td><td style={{padding:'5px 10px',textAlign:'right',fontWeight:600}}>{fmt(r.balance)}</td></tr>)})}</tbody></table></div>)}

/* ═══ PRESENT MODAL ═══ */
function PresentModal({onClose,R,rate,termYrs,totDebtBal,totDebtPmt,debts,applyDebtSav,extraPmt,curTotalMtg,curMtgBal,closingCost}){
  const[sa,setSa]=useState(false);const epy=Math.floor(R.extA.months/12),epm=R.extA.months%12,ys=Math.floor(R.moSaved/12),ms=R.moSaved%12,tco=curTotalMtg+totDebtPmt;
  const Sec=({title,children,style:s})=>(<div style={{marginTop:32,...s}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}><div style={{height:2,flex:1,background:'var(--border-light)'}}/><h3 style={{fontSize:11,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1.2,whiteSpace:'nowrap',textAlign:'center'}}>{title}</h3><div style={{height:2,flex:1,background:'var(--border-light)'}}/></div>{children}</div>);
  return(
    <div className="present-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}><div className="present-page">
      <div style={{background:'linear-gradient(135deg,#1a4a2c,var(--forest),var(--forest-light))',padding:'36px 40px 32px',position:'relative',overflow:'hidden'}}><div style={{position:'absolute',top:-40,right:-40,width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,.04)'}}/><div style={{position:'relative',zIndex:1}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div><div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:30,fontWeight:800,color:'#fff',letterSpacing:-.8}}>Your New Loan</h2></div><p style={{fontSize:14,color:'rgba(255,255,255,.7)',maxWidth:440}}>Here's how refinancing with debt consolidation puts more money back in your pocket every single month.</p></div><button onClick={onClose} className="no-print" style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:10,width:40,height:40,cursor:'pointer',color:'#fff',fontSize:22,display:'flex',alignItems:'center',justifyContent:'center'}}>×</button></div><div style={{marginTop:24,background:'rgba(255,255,255,.1)',borderRadius:14,padding:'18px 24px',border:'1px solid rgba(255,255,255,.12)',display:'inline-block'}}><div style={{fontSize:10,fontWeight:700,color:'rgba(255,255,255,.55)',textTransform:'uppercase',letterSpacing:1}}>New Loan Amount</div><div style={{fontSize:38,fontWeight:800,color:'#fff',letterSpacing:-.8,marginTop:2}}>{fmt(R.principal)}</div></div></div></div>
      <div style={{padding:'8px 40px 40px'}}>

g:'14px 16px',textAlign:'right',fontWeight:800,color:'var(--sienna)',fontSize:15}}>{fmt(totDebtBal)}</td><td style={{padding:'14px 16px',textAlign:'right',fontWeight:800,color:'var(--sienna)',fontSize:15}}>{fmt(totDebtPmt)}/mo</td><td style={{padding:'14px 16px',textAlign:'center',fontWeight:800,color:'var(--forest)',fontSize:15}}>$0.00</td></tr></tfoot></table></div><div style={{marginTop:14,padding:'14px 18px',background:'var(--forest-glow)',borderRadius:10,border:'1px solid #c2dbc9',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--forest)" strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M16 8l-5.3 6L8 11.4"/></svg><div><div style={{fontSize:14,fontWeight:700,color:'var(--forest)'}}>All {debts.filter(d=>d.balance>0).length} debts paid in full at closing</div><div style={{fontSize:12,color:'var(--ink-muted)'}}>Consolidated into your new mortgage — eliminating {debts.filter(d=>d.balance>0).length} separate monthly payments</div></div></div></Sec>}

s intended to help you evaluate your options and does not guarantee future results.</p></div></Sec>

        <Sec title="Your Loan Terms"><div style={{display:'flex',flexWrap:'wrap',gap:14}}><div style={{flex:'1 1 200px',background:'var(--parchment)',borderRadius:12,padding:'20px 24px',border:'1px solid var(--border-light)',textAlign:'center'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:1}}>Interest Rate</div><div style={{fontSize:36,fontWeight:800,letterSpacing:-.8,marginTop:4}}>{rate}%</div><div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:4}}>Fixed Rate</div></div><div style={{flex:'1 1 200px',background:'var(--parchment)',borderRadius:12,padding:'20px 24px',border:'1px solid var(--border-light)',textAlign:'center'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:1}}>Loan Term</div><div style={{fontSize:36,fontWeight:800,letterSpacing:-.8,marginTop:4}}>{termYrs} Years</div><div style={{fontSize:11.5,color:'var(--ink-muted)',marginTop:4}}>{termYrs*12} Monthly Payments</div></div><div style={{flex:'1 1 200px',background:'var(--forest-glow)',borderRadius:12,padding:'20px 24px',border:'1px solid #c2dbc9',textAlign:'center'}}><div style={{fontSize:10,fontWeight:700,color:'var(--forest)',textTransform:'uppercase',letterSpacing:1}}>New Loan Amount</div><div style={{fontSize:32,fontWeight:800,color:'var(--forest)',letterSpacing:-.8,marginTop:4}}>{fmt(R.principal)}</div></div></div></Sec>

        <div className="no-print" style={{display:'flex',gap:12,marginTop:36,justifyContent:'center',flexWrap:'wrap'}}><button onClick={()=>window.print()} style={{background:'linear-gradient(135deg,var(--forest),var(--forest-light))',color:'#fff',border:'none',borderRadius:10,padding:'14px 36px',fontSize:15,fontWeight:700,cursor:'pointer',boxShadow:'0 4px 16px rgba(38,90,58,.3)',display:'flex',alignItems:'center',gap:8}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print for Client</button><button onClick={onClose} style={{background:'var(--parchment)',color:'var(--ink-soft)',border:'1.5px solid var(--border)',borderRadius:10,padding:'14px 32px',fontSize:15,fontWeight:600,cursor:'pointer'}}>Back to Calculator</button></div>
        <div style={{textAlign:'center',fontSize:10.5,color:'var(--ink-faint)',marginTop:20,lineHeight:1.6}}>This is an estimate for illustrative and educational purposes only. It does not constitute a loan commitment, approval, or financial advice. Actual loan terms, interest rates, fees, and monthly payments may differ. Please consult with your loan officer for a personalized loan estimate.</div>

function App(){
  const[curMtgBal,setCurMtgBal]=useState(280000);const[curPI,setCurPI]=useState(1900);const[curEscrow,setCurEscrow]=useState(425);const[curMI,setCurMI]=useState(0);
  const curTotalMtg=(curPI||0)+(curEscrow||0)+(curMI||0);
  const[debts,setDebts]=useState([{id:1,name:"Visa Credit Card",balance:8500,payment:250},{id:2,name:"Mastercard",balance:5200,payment:160},{id:3,name:"Auto Loan",balance:15000,payment:420},{id:4,name:"Student Loan",balance:12000,payment:180},{id:5,name:"Personal Loan",balance:4800,payment:125}]);
  const[nextId,setNextId]=useState(6);const addDebt=()=>{setDebts([...debts,{id:nextId,name:"",balance:0,payment:0}]);setNextId(nextId+1)};const rmDebt=id=>setDebts(debts.filter(d=>d.id!==id));const updDebt=(id,u)=>setDebts(debts.map(d=>d.id===id?u:d));
  const totDebtBal=debts.reduce((s,d)=>s+(d.balance||0),0),totDebtPmt=debts.reduce((s,d)=>s+(d.payment||0),0);
  const[homeVal,setHomeVal]=useState(400000);const[rate,setRate]=useState(6.75);const[termYrs,setTermYrs]=useState(30);const[annTax,setAnnTax]=useState(3600);const[annIns,setAnnIns]=useState(1500);const[closingCost,setClosingCost]=useState(0);const[moMI,setMoMI]=useState(0);const[extraPmt,setExtraPmt]=useState(0);const[applyDebtSav,setApplyDebtSav]=useState(true);const[showAmort,setShowAmort]=useState(false);const[showPresent,setShowPresent]=useState(false);

  const R=useMemo(()=>{const principal=(curMtgBal||0)+totDebtBal+(closingCost||0);const ar=(rate||0)/100,tm=(termYrs||30)*12,mTax=(annTax||0)/12,mIns=(annIns||0)/12,mMI=moMI||0;const basePI=monthlyPI(principal,ar,tm);const totalPITI=basePI+mTax+mIns+mMI;const monthlySav=Math.max(0,(curTotalMtg+totDebtPmt)-totalPITI);const totalExtra=(extraPmt||0)+(applyDebtSav?monthlySav:0);const stdA=amortize(principal,ar,tm,0);const extA=amortize(principal,ar,tm,totalExtra);const intSaved=stdA.totalInterest-extA.totalInterest;const moSaved=stdA.months-extA.months;const effRate=totalExtra>0?findEffRate(principal,extA.totalInterest,tm):ar;return{principal,basePI,totalPITI,monthlySav,totalExtra,stdA,extA,intSaved,moSaved,effRate,ar,tm,mTax,mIns,mMI}},[curMtgBal,rate,termYrs,annTax,annIns,closingCost,moMI,extraPmt,debts,applyDebtSav,totDebtBal,totDebtPmt,curTotalMtg]);

  const ltv=(homeVal||1)>0?(R.principal/homeVal)*100:0,ys=Math.floor(R.moSaved/12),ms=R.moSaved%12,epy=Math.floor(R.extA.months/12),epm=R.extA.months%12;

  return(<div style={{maxWidth:940,margin:'0 auto',padding:'24px 16px 72px'}}>
    {showPresent&&<PresentModal onClose={()=>setShowPresent(false)} R={R} rate={rate} termYrs={termYrs} totDebtBal={totDebtBal} totDebtPmt={totDebtPmt} debts={debts} applyDebtSav={applyDebtSav} extraPmt={extraPmt} curTotalMtg={curTotalMtg} curMtgBal={curMtgBal} closingCost={closingCost}/>}

    <header className="animate-in" style={{textAlign:'center',marginBottom:32}}><div style={{display:'inline-flex',alignItems:'center',gap:12,marginBottom:8}}><div style={{width:42,height:42,borderRadius:10,background:'linear-gradient(135deg,var(--forest),var(--forest-light))',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 10px rgba(38,90,58,.25)'}}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:32,fontWeight:800,letterSpacing:-.8,lineHeight:1.1}}>Mortgage Refinance<br/><span style={{color:'var(--forest)',fontSize:26}}>Analyzer</span></h1></div><p style={{fontSize:13.5,color:'var(--ink-muted)',maxWidth:560,margin:'4px auto 0'}}>See the bigger picture. Consolidate high-interest debts into your mortgage, free up monthly cash flow, and use those savings to pay your home off faster.</p></header>

    <div style={{display:'flex',flexDirection:'column',gap:20}}>

      <Card title="Current Mortgage Loan Details" accent="var(--sienna)" delay={30}>
        <div style={{display:'flex',flexWrap:'wrap',gap:12}}><Inp label="Current Mortgage Balance" value={curMtgBal} onChange={setCurMtgBal} prefix="$"/><Inp label="Current P&I Payment" value={curPI} onChange={setCurPI} prefix="$"/><Inp label="Monthly Escrow (Tax + Ins)" value={curEscrow} onChange={setCurEscrow} prefix="$"/><Inp label="Mortgage Insurance (PMI)" value={curMI} onChange={setCurMI} prefix="$"/></div>
        <div style={{marginTop:16,padding:'16px 18px',background:'#fdf6f3',borderRadius:10,border:'1.5px solid rgba(156,74,45,.2)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}><div style={{fontSize:11,fontWeight:700,color:'var(--sienna)',textTransform:'uppercase',letterSpacing:1}}>Total Current Mortgage Payment</div><div style={{fontSize:28,fontWeight:800,color:'var(--sienna)',letterSpacing:-.5}}>{fmt(curTotalMtg)}<span style={{fontSize:13,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div></div>
      </Card>

      <Card title="Debts to Consolidate" subtitle="List each debt from the credit report that will be rolled into the new mortgage." accent="var(--sienna)" delay={80}>
        <div style={{display:'flex',flexDirection:'column'}}>{debts.map((d,i)=><DebtRow key={d.id} debt={d} idx={i+1} onUpdate={u=>updDebt(d.id,u)} onRemove={()=>rmDebt(d.id)}/>)}</div>
        <button onClick={addDebt} className="no-print" style={{marginTop:14,background:'none',border:'1.5px dashed var(--border)',borderRadius:8,padding:'9px 22px',cursor:'pointer',fontSize:13,fontWeight:700,color:'var(--ink-muted)',transition:'all .2s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--sienna)';e.currentTarget.style.color='var(--sienna)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--ink-muted)'}}>+ Add Debt</button>
        <div style={{marginTop:18,padding:'18px 20px',background:'#fdf6f3',borderRadius:12,border:'2px solid var(--sienna)'}}><div style={{display:'flex',flexWrap:'wrap',gap:16,alignItems:'center'}}><div style={{flex:'1 1 130px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Current Mortgage</div><div style={{fontSize:20,fontWeight:700,color:'var(--ink)',marginTop:3}}>{fmt(curTotalMtg)}<span style={{fontSize:11,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div></div><div style={{fontSize:22,fontWeight:300,color:'var(--border)'}}>+</div><div style={{flex:'1 1 120px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Total Debt Balance</div><div style={{fontSize:20,fontWeight:700,color:'var(--sienna)',marginTop:3}}>{fmt(totDebtBal)}</div></div><div style={{flex:'1 1 120px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--ink-faint)',textTransform:'uppercase',letterSpacing:.8}}>Total Debt Payments</div><div style={{fontSize:20,fontWeight:700,color:'var(--sienna)',marginTop:3}}>{fmt(totDebtPmt)}<span style={{fontSize:11,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div></div><div style={{fontSize:22,fontWeight:300,color:'var(--border)'}}>=</div><div style={{flex:'1 1 160px'}}><div style={{fontSize:10,fontWeight:700,color:'var(--sienna)',textTransform:'uppercase',letterSpacing:.8}}>Total Monthly Outgoing</div><div style={{fontSize:28,fontWeight:800,color:'var(--sienna)',marginTop:3}}>{fmt(curTotalMtg+totDebtPmt)}<span style={{fontSize:12,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div></div></div></div>
      </Card>

      <Card title="New Loan Details" accent="var(--forest)" delay={120}>
        <div style={{display:'flex',flexWrap:'wrap',gap:12}}><Inp label="Home Value" value={homeVal} onChange={setHomeVal} prefix="$"/><Inp label="Interest Rate" value={rate} onChange={setRate} suffix="%" step="0.125"/><Inp label="Loan Term" value={termYrs} onChange={setTermYrs} suffix="yrs"/></div>
        <div style={{display:'flex',flexWrap:'wrap',gap:12,marginTop:14}}><Inp label="Annual Property Taxes" value={annTax} onChange={setAnnTax} prefix="$"/><Inp label="Annual Homeowners Ins." value={annIns} onChange={setAnnIns} prefix="$"/><Inp label="Closing Costs" value={closingCost} onChange={setClosingCost} prefix="$"/><Inp label="Monthly Mortgage Ins." value={moMI} onChange={setMoMI} prefix="$"/></div>
        <ConsolidationBar curMtgBal={curMtgBal} totDebtBal={totDebtBal} closingCost={closingCost} principal={R.principal}/>
        <LTVGauge ltv={ltv} homeVal={homeVal} principal={R.principal} totDebtBal={totDebtBal} totDebtPmt={totDebtPmt}/>
      </Card>

      <Card title="Monthly Payment Overview" accent="var(--gold)" delay={160}>
        <div style={{display:'flex',flexWrap:'wrap',gap:14,marginBottom:20}}><div style={{flex:'1 1 240px',background:'#fdf6f3',borderRadius:12,padding:'18px 20px',border:'1.5px solid rgba(156,74,45,.2)'}}><div style={{fontSize:10,fontWeight:700,color:'var(--sienna)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>What You're Paying Now</div><div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(156,74,45,.1)'}}><span style={{fontSize:12.5,color:'var(--ink-muted)'}}>Current Mortgage (PITI)</span><span style={{fontSize:13,fontWeight:600}}>{fmt(curTotalMtg)}</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(156,74,45,.1)'}}><span style={{fontSize:12.5,color:'var(--ink-muted)'}}>Debt Payments</span><span style={{fontSize:13,fontWeight:600,color:'var(--sienna)'}}>{fmt(totDebtPmt)}</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',marginTop:4}}><span style={{fontSize:13,fontWeight:700,color:'var(--sienna)'}}>Total Outgoing</span><span style={{fontSize:20,fontWeight:800,color:'var(--sienna)'}}>{fmt(curTotalMtg+totDebtPmt)}</span></div></div><div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px'}}><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--forest)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div><div style={{flex:'1 1 240px',background:'var(--forest-glow)',borderRadius:12,padding:'18px 20px',border:'1.5px solid #c2dbc9'}}><div style={{fontSize:10,fontWeight:700,color:'var(--forest)',textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>Your New Payment</div><div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(38,90,58,.1)'}}><span style={{fontSize:12.5,color:'var(--ink-muted)'}}>Principal & Interest</span><span style={{fontSize:13,fontWeight:600}}>{fmt(R.basePI)}</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(38,90,58,.1)'}}><span style={{fontSize:12.5,color:'var(--ink-muted)'}}>Escrow (Tax + Ins{R.mMI>0?' + MI':''})</span><span style={{fontSize:13,fontWeight:600}}>{fmt(R.mTax+R.mIns+R.mMI)}</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(38,90,58,.1)'}}><span style={{fontSize:12.5,color:'var(--ink-muted)'}}>Debt Payments</span><span style={{fontSize:13,fontWeight:800,color:'var(--forest)'}}>$0.00</span></div><div style={{display:'flex',justifyContent:'space-between',padding:'8px 0',marginTop:4}}><span style={{fontSize:13,fontWeight:700,color:'var(--forest)'}}>Total New Payment</span><span style={{fontSize:20,fontWeight:800,color:'var(--forest)'}}>{fmt(R.totalPITI)}</span></div></div></div>
        <div style={{padding:'20px 22px',background:'linear-gradient(135deg,var(--forest-glow),var(--parchment))',borderRadius:12,border:'1.5px solid #c2dbc9'}}><div style={{display:'flex',flexWrap:'wrap',gap:24,alignItems:'center'}}><div style={{flex:'1 1 240px'}}><div style={{fontSize:11,fontWeight:700,color:'var(--forest)',textTransform:'uppercase',letterSpacing:1}}>Monthly Savings</div><div style={{fontSize:42,fontWeight:800,color:'var(--forest)',marginTop:6,letterSpacing:-1}}>{fmt(R.monthlySav)}<span style={{fontSize:15,fontWeight:500,color:'var(--ink-muted)'}}>/mo</span></div><div style={{fontSize:12.5,color:'var(--ink-muted)',marginTop:4}}>Previously paying {fmt(curTotalMtg+totDebtPmt)} → Now paying {fmt(R.totalPITI)}</div><div style={{display:'inline-flex',alignItems:'center',gap:8,marginTop:10,padding:'8px 16px',background:'rgba(38,90,58,.08)',borderRadius:8,border:'1px solid rgba(38,90,58,.15)'}}><span style={{fontSize:11,fontWeight:700,color:'var(--forest)',textTransform:'uppercase',letterSpacing:.8}}>Yearly</span><span style={{fontSize:24,fontWeight:800,color:'var(--forest)',letterSpacing:-.5}}>{fmt(R.monthlySav*12)}</span><span style={{fontSize:12,fontWeight:500,color:'var(--ink-muted)'}}>/yr</span></div></div><div style={{flex:'1 1 200px',display:'flex',flexDirection:'column',gap:14}}><label style={{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'}} className="no-print"><input type="checkbox" checked={applyDebtSav} onChange={e=>setApplyDebtSav(e.target.checked)} style={{width:20,height:20,accentColor:'var(--forest)',marginTop:2,flexShrink:0}}/><span><span style={{fontSize:14,fontWeight:700}}>Re-invest savings as extra mortgage payment</span><br/><span style={{fontSize:12,color:'var(--ink-muted)'}}>Total extra: <strong style={{color:'var(--forest)'}}>{fmt(R.totalExtra)}</strong>/mo{R.totalExtra>0&&applyDebtSav&&extraPmt>0&&<span> ({fmt(R.monthlySav)} savings + {fmt(extraPmt)} extra)</span>}</span></span></label><Inp label="Add'l Extra Payment" value={extraPmt} onChange={setExtraPmt} prefix="$"/></div></div></div>
      </Card>

      <Card title="Interest Savings & Effective Rate" accent="var(--forest)" delay={200}>
        <div style={{display:'flex',flexWrap:'wrap',gap:12}}><Stat label="Effective Rate" value={fmtPct(R.effRate)} sub={`Your ${rate}% rate effectively behaves like ${fmtPct(R.effRate)} with ${fmt(R.totalExtra)}/mo extra.`} color="var(--forest)" large/><Stat label="Total Interest Saved" value={fmt(R.intSaved)} sub={R.totalExtra>0?`Compared to minimum payments over ${termYrs} years`:"Add extra payments to see savings"} color="var(--gold)" large/><Stat label="Payoff Accelerated By" value={R.moSaved>0?`${ys}yr ${ms}mo`:"—"} sub={R.totalExtra>0?`Paid in ${epy}yr ${epm}mo instead of ${termYrs}yr`:""} color="var(--sienna)" large/></div>
        <div style={{marginTop:24}}><h3 style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Total Loan Cost Breakdown</h3><CostBar principal={R.principal} interest={R.extA.totalInterest} saved={R.intSaved}/></div>
        <div style={{marginTop:28}}><h3 style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Balance Over Time</h3><Chart stdRows={R.stdA.rows} extRows={R.extA.rows} termMonths={R.tm}/></div>
        <div style={{marginTop:24,overflowX:'auto'}}><h3 style={{fontSize:12,fontWeight:700,color:'var(--ink-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>Side-by-Side Comparison</h3><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}><thead><tr style={{borderBottom:'2px solid var(--border)'}}><th style={{padding:'8px 12px',textAlign:'left',fontWeight:700,fontSize:11,color:'var(--ink-muted)',textTransform:'uppercase'}}></th><th style={{padding:'8px 12px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--sienna)',textTransform:'uppercase'}}>Minimum Only</th><th style={{padding:'8px 12px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--forest)',textTransform:'uppercase'}}>With Extra</th><th style={{padding:'8px 12px',textAlign:'right',fontWeight:700,fontSize:11,color:'var(--gold)',textTransform:'uppercase'}}>Difference</th></tr></thead><tbody>{[["Monthly Payment",fmt(R.basePI),fmt(R.basePI+R.totalExtra),fmt(R.totalExtra)],["Total Interest",fmt(R.stdA.totalInterest),fmt(R.extA.totalInterest),fmt(R.intSaved)],["Total Cost",fmt(R.principal+R.stdA.totalInterest),fmt(R.principal+R.extA.totalInterest),fmt(R.intSaved)],["Payoff Time",`${termYrs}yr 0mo`,`${epy}yr ${epm}mo`,R.moSaved>0?`${ys}yr ${ms}mo earlier`:"—"]].map((r,i)=><tr key={i} style={{borderBottom:'1px solid var(--border-light)',background:i%2===0?'var(--parchment)':'transparent'}}><td style={{padding:'9px 12px',fontWeight:600,color:'var(--ink-soft)'}}>{r[0]}</td><td style={{padding:'9px 12px',textAlign:'right',color:'var(--sienna)',fontWeight:500}}>{r[1]}</td><td style={{padding:'9px 12px',textAlign:'right',color:'var(--forest)',fontWeight:600}}>{r[2]}</td><td style={{padding:'9px 12px',textAlign:'right',color:'var(--gold)',fontWeight:700}}>{r[3]}</td></tr>)}</tbody></table></div>
      </Card>

      <div className="no-print animate-in" style={{display:'flex',justifyContent:'center',animationDelay:'220ms'}}><button onClick={()=>setShowPresent(true)} style={{background:'linear-gradient(135deg,var(--forest),var(--forest-light))',color:'#fff',border:'none',borderRadius:14,padding:'20px 52px',fontSize:18,fontWeight:800,cursor:'pointer',boxShadow:'0 6px 28px rgba(38,90,58,.35)',transition:'transform .2s,box-shadow .2s',display:'flex',alignItems:'center',gap:14}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='0 10px 36px rgba(38,90,58,.45)'}} onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='0 6px 28px rgba(38,90,58,.35)'}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Present New Loan to Client</button></div>

      <Card title="Full Amortization Schedule" accent="var(--ink-faint)" delay={250}>
        <button onClick={()=>setShowAmort(!showAmort)} className="no-print" style={{background:showAmort?'var(--forest)':'var(--parchment)',color:showAmort?'#fff':'var(--forest)',border:'1.5px solid var(--forest)',borderRadius:8,padding:'9px 24px',cursor:'pointer',fontSize:13,fontWeight:700,transition:'all .25s'}}>{showAmort?'Hide Schedule ▲':'Show Month-by-Month Schedule ▼'}</button>
        {showAmort&&<AmortTable rows={R.extA.rows} basePI={R.basePI}/>}
      </Card>

      <div style={{textAlign:'center',fontSize:11.5,color:'var(--ink-faint)',marginTop:12,lineHeight:1.7}}>This calculator is for illustrative purposes only and does not constitute a loan commitment or financial advice.<br/>Actual loan terms, rates, fees, and payments may vary. Please consult your loan officer for a personalized quote.</div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
